<!DOCTYPE html>
<html lang="en">
<head>
    <!--linking style sheet and script file to the html page--->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<!--creating Login and Sign up toggles-->
<body>
    <img src="../pictures/GLH logo.png" alt="GLH Logo" class="logo">
    <div class="container">
        <div class="form-container">
            <div class="form-toggle">
                <button id="login-toggle" class="active">Login</button>
                <button id="signup-toggle">Register with Us!</button>
            </div>
            <!--creating login and sign up forms--->
            <form id="login-form" class="form active">
                <h2>Login</h2>
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <p class="switch-link">Don't have an account? <a href="#" id="switch-to-signup">Sign up</a></p>
            </form>
            <form id="signup-form" class="form">
                <h2>Register with Us!</h2>
                <div class="input-group">
                    <label for="signup-first-name">First Name</label>
                    <input type="text" id="signup-first-name" required>
                </div>
                <div class="input-group">
                    <label for="signup-last-name">Last Name</label>
                    <input type="text" id="signup-last-name" required>
                </div>
                <div class="input-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="input-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" required>
                </div>
                <!-- giving users the ability to choose their role -->
                <div class="input-group">
                    <label for="signup-role">Select Role</label>
                    <select name="role" id="signup-role" class="role" placeholder="Please select your role" required>
                        <option value="">Select Role</option>
                        <option value="student">Customer</option>
                        <option value="teacher">Farmer/Producer</option>
                    </select>
                    <!-- giving users the ability to login or signup if they are directed to the wrong page -->
                </div>
                <button type="submit" class="btn">Sign Up</button>
                <p class="switch-link">Already have an account? <a href="#" id="switch-to-login">Sign in!</a></p>
            </form>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
